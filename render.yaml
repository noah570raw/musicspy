services:
  - type: web
    name: musicspy
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run db:init && npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: musicspy-postgres
          property: internalConnectionString
      - key: PGSSLMODE
        value: require

databases:
  - name: musicspy-postgres
    plan: free
    databaseName: musicspy
    user: musicspy
